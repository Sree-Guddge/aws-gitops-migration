# ci/apply-prod.yml
# Triggered on merge to main for changes under envs/prod/ or modules/.
# Requires explicit human approval via the "production" GitHub environment gate.

name: "Terraform Apply -- Prod"

on:
  push:
    branches: [main]
    paths:
      - "envs/prod/**"
      - "modules/**"

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: "us-west-2"
  ENV: "prod"

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_PROD }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "github-plan-prod"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="kms_key_id=${{ secrets.TF_STATE_KMS_KEY_ID }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"
        working-directory: envs/${{ env.ENV }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -out=tfplan.binary \
            -no-color 2>&1 | tee plan-output.txt
        working-directory: envs/${{ env.ENV }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod-${{ github.sha }}
          path: |
            envs/prod/tfplan.binary
            envs/prod/plan-output.txt
          retention-days: 3

  apply:
    needs: plan
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_PROD }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "github-apply-prod"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod-${{ github.sha }}
          path: envs/prod/

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="kms_key_id=${{ secrets.TF_STATE_KMS_KEY_ID }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}"
        working-directory: envs/${{ env.ENV }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan.binary
        working-directory: envs/${{ env.ENV }}

      - name: Run Smoke Tests
        run: bash tests/smoke_prod.sh
        env:
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Post-Apply Notification (Success)
        if: success()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Terraform Apply succeeded for *prod* environment.\nCommit: ${{ github.sha }}\nActor: ${{ github.actor }}\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

      - name: Post-Apply Notification (Failure)
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Terraform Apply FAILED for *prod* environment.\nCommit: ${{ github.sha }}\nActor: ${{ github.actor }}\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
