# .github/workflows/apply-dev.yml
# Triggered on merge to main for changes under envs/dev/ or modules/.
# Applies automatically after smoke tests pass -- no manual approval required for dev.

name: "Terraform Apply -- Dev"

on:
  push:
    branches: [main]
    paths:
      - "envs/dev/**"
      - "modules/**"

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.8.5"
  AWS_REGION: ${{ vars.AWS_REGION }}
  ENV: "dev"

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "github-plan-dev"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="kms_key_id=${{ secrets.TF_STATE_KMS_KEY_ID }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="region=${{ env.AWS_REGION }}"
        working-directory: envs/${{ env.ENV }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="log_bucket_name=${{ secrets.LOG_BUCKET_NAME }}" \
            -var-file=terraform.tfvars \
            -out=tfplan.binary \
            -no-color 2>&1 | tee plan-output.txt
        working-directory: envs/${{ env.ENV }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev-${{ github.sha }}
          path: |
            envs/dev/tfplan.binary
            envs/dev/plan-output.txt
          retention-days: 3

  apply:
    needs: plan
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: "github-apply-dev"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev-${{ github.sha }}
          path: envs/dev/

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="kms_key_id=${{ secrets.TF_STATE_KMS_KEY_ID }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="region=${{ env.AWS_REGION }}"
        working-directory: envs/${{ env.ENV }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan.binary
        working-directory: envs/${{ env.ENV }}

      - name: Run Smoke Tests
        run: bash tests/smoke_dev.sh
        env:
          AWS_REGION: ${{ env.AWS_REGION }}

      - name: Post-Apply Notification (Success)
        if: success()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Terraform Apply succeeded for *dev* environment.\nCommit: ${{ github.sha }}\nActor: ${{ github.actor }}\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

      - name: Post-Apply Notification (Failure)
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Terraform Apply FAILED for *dev* environment.\nCommit: ${{ github.sha }}\nActor: ${{ github.actor }}\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
